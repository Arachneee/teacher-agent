spring:
  application:
    name: teacher-agent-backend

  datasource:
    url: jdbc:h2:mem:teacher_agent;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key}
      chat:
        options:
          model: gpt-4o-mini

logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: "OFF"

cors:
  allowed-origin-patterns: http://localhost:3000

app:
  initial-teacher:
    username: ${INITIAL_TEACHER_USERNAME:admin}
    password: ${INITIAL_TEACHER_PASSWORD:changeme}
